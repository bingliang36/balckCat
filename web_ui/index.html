<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和小猫聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe4d6 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 标题栏 */
        .header {
            background: linear-gradient(135deg, #ffb6c1 0%, #ffd4a3 100%);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 10px rgba(255, 182, 193, 0.3);
        }

        .header h1 {
            color: #5a3a2a;
            font-size: 16px;
            font-weight: 600;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.4);
            border: none;
            padding: 5px 10px;
            border-radius: 12px;
            color: #5a3a2a;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        /* 头像 */
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }

        .message.assistant .avatar {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        /* 气泡 */
        .bubble {
            padding: 10px 14px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 14px;
            position: relative;
            word-break: break-word;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #ffb6c1 0%, #ffc3a0 100%);
            color: #4a2a1a;
            border-bottom-right-radius: 5px;
        }

        .message.assistant .bubble {
            background: #ffffff;
            color: #333333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        /* 正在输入动画 */
        .typing .bubble {
            padding: 12px 16px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            background: #aaa;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        /* 输入区域 */
        .input-area {
            background: #fff;
            padding: 12px 15px;
            border-top: 1px solid #ffe4d6;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: #fff5f0;
            border-radius: 20px;
            padding: 8px 14px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #ffb6c1;
        }

        #messageInput {
            flex: 1;
            border: none;
            background: transparent;
            resize: none;
            font-size: 14px;
            line-height: 1.4;
            max-height: 80px;
            outline: none;
            color: #333;
        }

        #messageInput::placeholder {
            color: #bbb;
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ffb6c1 0%, #ff9a9e 100%);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 3px 10px rgba(255, 182, 193, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.5);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: #ddd;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 设置面板 */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .settings-overlay.show {
            display: flex;
        }

        .settings-panel {
            background: #fff;
            border-radius: 16px;
            width: 90%;
            max-width: 360px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .settings-header {
            background: linear-gradient(135deg, #ffb6c1 0%, #ffd4a3 100%);
            padding: 12px 16px;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-header h2 {
            color: #5a3a2a;
            font-size: 14px;
        }

        .settings-close {
            background: rgba(255, 255, 255, 0.5);
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            color: #5a3a2a;
        }

        .settings-content {
            padding: 16px;
        }

        .setting-item {
            margin-bottom: 16px;
        }

        .setting-item label {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .setting-item input,
        .setting-item select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ffe4d6;
            border-radius: 8px;
            font-size: 13px;
            background: #fff5f0;
            color: #333;
            outline: none;
        }

        .setting-item input:focus,
        .setting-item select:focus {
            border-color: #ffb6c1;
        }

        .setting-item input[type="checkbox"] {
            width: auto;
            accent-color: #ffb6c1;
        }

        .setting-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .save-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #ffb6c1 0%, #ff9a9e 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
        }
    </style>
</head>
<body>
    <!-- 标题栏 -->
    <div class="header">
        <h1>🐱 小黑</h1>
        <button class="header-btn" onclick="showSettings()">设置</button>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-container" id="chatContainer">
        <!-- 欢迎消息 -->
        <div class="message assistant">
            <div class="avatar">🐱</div>
            <div class="bubble">喵~ 你好呀！我是小黑，有什么想和我聊的吗？</div>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">▶</button>
    </div>

    <!-- 设置面板 -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-panel">
            <div class="settings-header">
                <h2>⚙️ 设置</h2>
                <button class="settings-close" onclick="hideSettings()">×</button>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <label>记忆系统</label>
                    <div class="setting-group">
                        <input type="checkbox" id="memEnabled">
                        <span>启用云端记忆（收费功能）</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label>STT 模式</label>
                    <select id="sttMode">
                        <option value="ptt">按键说话 (PTT)</option>
                        <option value="vad">连续语音检测 (VAD)</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>语速</label>
                    <select id="ttsSpeed">
                        <option value="0.8">慢速</option>
                        <option value="1.0" selected>正常</option>
                        <option value="1.2">快速</option>
                    </select>
                </div>
                <button class="save-btn" onclick="saveSettings()">保存设置</button>
            </div>
        </div>
    </div>

    <script>
        // 打字机状态
        let typewriterActive = false;
        let currentBubbleEl = null;
        let currentFullText = '';
        let currentDisplayIndex = 0;
        let waitForDone = false;

        // 轮询
        let pollInterval = null;

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // 先停止轮询，清空状态
            stopAll();

            // 添加用户消息
            addMessage(text, 'user');
            input.value = '';
            autoResize(input);

            // 显示正在输入
            addTyping();

            // 发送到服务器
            await fetch('/api/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            });

            // 开始轮询
            startPolling();
        }

        // 完全重置状态
        function stopAll() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
            typewriterActive = false;
            waitForDone = false;
            currentBubbleEl = null;
            currentFullText = '';
            currentDisplayIndex = 0;
            removeTyping();
        }

        // 开始轮询
        let pollStartTime = 0;
        function startPolling() {
            pollStartTime = Date.now();
            pollInterval = setInterval(async () => {
                try {
                    // 超时保护：30秒没收到done信号则强制停止
                    if (Date.now() - pollStartTime > 30000) {
                        console.log('Poll timeout, forcing stop');
                        stopAll();
                        return;
                    }

                    const resp = await fetch('/api/poll');
                    const msgs = await resp.json();

                    for (const msg of msgs) {
                        if (msg.type === 'chunk') {
                            appendText(msg.text);
                        } else if (msg.type === 'done') {
                            // done 不立即停止，等打字机动画自然结束
                            // 通过设置一个标志让 typewriterTick 完成后自动停止
                            waitForDone = true;
                        }
                    }
                } catch (e) {
                    console.error('Poll error:', e);
                }
            }, 100);
        }

        // 添加文字到气泡
        function appendText(text) {
            if (!typewriterActive) {
                // 开始新的打字动画
                typewriterActive = true;
                waitForDone = false;
                currentFullText = text;
                currentDisplayIndex = 0;
                removeTyping();
                createAssistantBubble();
                typewriterTick();
            } else {
                // 追加文字
                currentFullText += text;
            }
        }

        // 创建助手气泡
        function createAssistantBubble() {
            const container = document.getElementById('chatContainer');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';
            msgDiv.innerHTML = `<div class="avatar">🐱</div><div class="bubble"></div>`;
            container.appendChild(msgDiv);
            currentBubbleEl = msgDiv.querySelector('.bubble');
            scrollToBottom();
        }

        // 打字机动画
        function typewriterTick() {
            if (currentDisplayIndex < currentFullText.length && typewriterActive) {
                currentBubbleEl.textContent += currentFullText[currentDisplayIndex];
                currentDisplayIndex++;
                scrollToBottom();
                setTimeout(typewriterTick, 30);
            } else if (waitForDone && typewriterActive) {
                // 打字完成且收到了 done 信号
                stopAll();
            }
        }

        // 添加消息（直接显示）
        function addMessage(text, sender) {
            const container = document.getElementById('chatContainer');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            const avatar = sender === 'user' ? '👤' : '🐱';
            msgDiv.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${escapeHtml(text)}</div>`;
            container.appendChild(msgDiv);
            scrollToBottom();
        }

        // 添加正在输入动画
        function addTyping() {
            const container = document.getElementById('chatContainer');
            const existing = container.querySelector('.typing');
            if (existing) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant typing';
            msgDiv.innerHTML = `<div class="avatar">🐱</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
            container.appendChild(msgDiv);
            scrollToBottom();
        }

        function removeTyping() {
            const typing = document.querySelector('.typing');
            if (typing) typing.remove();
        }

        // 自动调整输入框高度
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 80) + 'px';
        }

        // 回车发送
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // 滚动到底部
        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 设置面板
        function showSettings() {
            document.getElementById('settingsOverlay').classList.add('show');
        }

        function hideSettings() {
            document.getElementById('settingsOverlay').classList.remove('show');
        }

        function saveSettings() {
            alert('设置已保存！');
            hideSettings();
        }
    </script>
</body>
</html>
